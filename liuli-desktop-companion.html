<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>零 · 桌面伴侣 · 琉璃</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: transparent;
            overflow: hidden;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* 主伴侣容器 —— 浮动静置 */
        #companion {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 320px;
            height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            filter: drop-shadow(0 12px 28px rgba(0, 0, 0, 0.2));
            transition: filter 0.2s;
            pointer-events: none;  /* 让点击穿透，但子控件可交互 */
        }

        /* 交互区域：可拖动/点击，覆盖在伴侣区 */
        #interaction-zone {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: auto;
            cursor: grab;
            background: transparent;
            border-radius: 60px 60px 40px 40px;
            transition: background 0.2s;
        }
        #interaction-zone:active {
            cursor: grabbing;
        }

        /* 琉璃形象主体 */
        #liuli-body {
            position: relative;
            width: 200px;
            height: 200px;
            margin-bottom: 16px;
            pointer-events: none;  /* 鼠标事件由外层控制 */
            flex-shrink: 0;
        }

        /* 核心脸蛋+眼睛 */
        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, #f9f2ff, #dad0ec);
            border-radius: 50% 50% 45% 45% / 50% 50% 40% 40%;
            box-shadow: 0 8px 0 #b3a1c9, 0 12px 18px rgba(80, 40, 120, 0.2);
            overflow: hidden;
            transition: all 0.2s ease;
            pointer-events: none;
        }

        /* 眼睛容器 */
        .eyes {
            position: absolute;
            top: 38%;
            left: 10%;
            width: 80%;
            height: 30%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 18px;
            pointer-events: none;
        }

        .eye {
            position: relative;
            width: 34px;
            height: 44px;
            background: #f9f3ff;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: inset 0 -4px 0 #b7a6d4, inset 0 4px 8px rgba(255,255,255,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
        }

        .pupil {
            width: 18px;
            height: 22px;
            background: #1b1a2e;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            position: relative;
            transition: 0.08s linear;
            box-shadow: 0 0 0 2px #b49ed6;
        }

        .pupil::after {
            content: '';
            position: absolute;
            top: 4px;
            left: 5px;
            width: 7px;
            height: 7px;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            transition: 0.1s;
        }

        /* 嘴巴 —— 轻微笑意 */
        .mouth {
            position: absolute;
            bottom: 28%;
            left: 50%;
            transform: translateX(-50%);
            width: 32px;
            height: 16px;
            border-bottom: 4px solid #6c5b7e;
            border-radius: 0 0 30px 30px;
            transition: all 0.25s ease;
            pointer-events: none;
            opacity: 0.7;
        }

        /* 腮红 (可爱) */
        .blush {
            position: absolute;
            top: 55%;
            width: 28px;
            height: 16px;
            background: rgba(255, 150, 190, 0.3);
            border-radius: 50%;
            filter: blur(5px);
            pointer-events: none;
        }
        .blush.left { left: 12%; }
        .blush.right { right: 12%; }

        /* 刘海装饰 */
        .hair-piece {
            position: absolute;
            top: -10px;
            left: 20px;
            width: 70px;
            height: 40px;
            background: #cdb8e6;
            border-radius: 50% 50% 20% 20% / 80% 80% 20% 20%;
            transform: rotate(-12deg);
            opacity: 0.5;
            pointer-events: none;
        }
        .hair-piece.right {
            left: auto;
            right: 20px;
            transform: rotate(12deg);
        }

        /* 名字 + 状态条 */
        #status-bar {
            pointer-events: auto;
            background: rgba(245, 235, 255, 0.7);
            backdrop-filter: blur(6px);
            padding: 10px 22px;
            border-radius: 40px;
            box-shadow: 0 4px 12px rgba(90, 60, 130, 0.15);
            display: flex;
            align-items: center;
            gap: 14px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: 0.2s;
            width: fit-content;
            margin-bottom: 12px;
        }

        #status-bar:hover {
            background: rgba(250, 240, 255, 0.85);
            box-shadow: 0 8px 18px rgba(60, 30, 100, 0.2);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #8bc79b;
            box-shadow: 0 0 8px rgba(100, 200, 130, 0.4);
            transition: 0.3s;
        }

        .dot.sleep {
            background: #b0b0c0;
            box-shadow: none;
        }

        .status-text {
            font-weight: 500;
            color: #2f2340;
            letter-spacing: 0.5px;
            font-size: 15px;
        }

        .name-tag {
            font-weight: 600;
            background: linear-gradient(145deg, #8976ad, #624d82);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 18px;
            padding-right: 6px;
            border-right: 1px solid #cdbde0;
        }

        /* 互动按钮 */
        #action-panel {
            display: flex;
            gap: 16px;
            pointer-events: auto;
            margin-top: 6px;
            background: rgba(235, 225, 250, 0.5);
            backdrop-filter: blur(8px);
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .action-btn {
            background: transparent;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition
