<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#212121">
<title>零</title>
<link rel="stylesheet" href="/static/style.css">
    <!-- DOMPurify for safe markdown rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- Theme detection script -->
    <script>
      (function(){
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const stored = localStorage.getItem('zero-theme');
        const theme = stored || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
        window.toggleTheme = function(){
          const cur = document.documentElement.getAttribute('data-theme');
          const next = cur === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('zero-theme', next);
        };
      })();
    </script>
</head>
<body>

<div class="login-overlay" id="login">
  <div class="login-logo">零</div>
  <div class="login-title">请输入暗号解锁</div>
  <input id="code" class="login-input" type="text" placeholder="暗号" autocomplete="off" autofocus aria-label="暗号输入">
  <button class="login-btn" onclick="unlock()" aria-label="解锁">解锁</button>
  <div class="login-err" id="err"></div>
</div>

<div class="app" id="app">
  <!-- 侧边栏 -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <span class="sidebar-logo">零</span>
        <span class="sidebar-version">v5</span>
      </div>
      <button class="new-chat-btn" onclick="newChat()" title="新对话" aria-label="新建对话">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        <span>新对话</span>
      </button>
    </div>

    <div class="conversations" id="convList" role="list">
      <div class="conv-section-title" id="convTitle" style="display:none;">最近对话</div>
    </div>

    <!-- Agent 状态栏 -->
    <div class="sidebar-section-title">Agents</div>
    <div class="agent-list" id="agentList">
      <div class="agent-card" data-agent="" onclick="switchAgent(this)">
        <div class="agent-dot" id="dot_zero"></div>
        <div class="agent-name">零 · 智能路由</div>
        <div class="agent-status-text" id="status_zero"></div>
      </div>
      <div class="agent-card" data-agent="agnes_text" onclick="switchAgent(this)">
        <div class="agent-dot" id="dot_agnes_text"></div>
        <div class="agent-name">Agnes 2.0</div>
        <div class="agent-status-text" id="status_agnes_text"></div>
      </div>
      <div class="agent-card" data-agent="reasonix" onclick="switchAgent(this)">
        <div class="agent-dot" id="dot_reasonix"></div>
        <div class="agent-name">Reasonix · 代码</div>
        <div class="agent-status-text" id="status_reasonix"></div>
      </div>
      <div class="agent-card" data-agent="tavily" onclick="switchAgent(this)">
        <div class="agent-dot" id="dot_tavily"></div>
        <div class="agent-name">Tavily · 搜索</div>
        <div class="agent-status-text" id="status_tavily"></div>
      </div>
    </div>

    <!-- Token 栏 -->
    <div class="token-bar">
      <span class="token-label">🧾</span>
      <span class="token-value" id="tokenTotal">0</span>
      <span class="token-label">tokens</span>
      <span class="token-sep">|</span>
      <span class="token-label">$</span>
      <span class="token-value" id="tokenCost">0.00</span>
      <span class="token-sep">|</span>
      <span class="token-label">缓存</span>
      <span class="token-value" id="tokenCache">0%</span>
    </div>

    <!-- 重连/离线提示 -->
    <div class="sidebar-offline" id="offlineBanner" style="display:none;">
      <span>⚠️ 连接断开</span>
      <button onclick="reconnectServer()">重连</button>
    </div>
  </div>

  <!-- 遮罩 -->
  <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>

  <!-- 主聊天区 -->
  <div class="main">
    <div class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()" title="菜单" aria-label="打开菜单">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      </button>
      <div class="topbar-title" id="chatTitle">零</div>
      <div class="topbar-spacer"></div>
      <div class="topbar-status" id="topbarStatus"></div>
    </div>

    <div class="messages" id="msgs" role="log" aria-live="polite" aria-label="聊天消息"></div>

    <!-- 输入区 -->
    <div class="input-area">
      <div class="input-wrapper">
        <div class="input-actions">
          <button class="attach-btn" onclick="attachFile()" title="添加文件" aria-label="添加文件">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <input type="file" id="fileInput" style="display:none" onchange="handleFileSelect(event)">
          <div id="filePreview" class="file-preview" style="display:none">
            <span id="fileName"></span>
            <button onclick="clearFile()" class="file-remove">✕</button>
          </div>
        </div>
        <div class="input-box">
          <textarea id="inp" rows="1" placeholder="给零发消息..." onkeydown="handleKey(event)" oninput="autoResize(this)" aria-label="消息输入"></textarea>
          <button class="send-btn" id="sendBtn" onclick="send()" title="发送" aria-label="发送消息">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
          </button>
        </div>
        <div class="input-hint">零可能会出错。请核对重要信息。</div>
      </div>
    </div>
  </div>
</div>

<!-- 图片灯箱 -->
<div class="lightbox-overlay" id="lightbox" onclick="closeLightbox(event)" onkeydown="if(event.key==='Escape')closeLightbox()" role="dialog" aria-modal="true" aria-label="图片预览">
  <div class="lightbox-content">
    <button class="lightbox-close" onclick="closeLightbox()" title="关闭" aria-label="关闭预览">✕</button>
    <button class="lightbox-download" id="lightboxDownload" title="保存到本地" aria-label="保存图片">保存</button>
    <img id="lightboxImg" src="" alt="原图">
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
